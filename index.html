<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Trending 周刊</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--card:#1c2333;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;--green:#3fb950;--orange:#d2991d;--purple:#a371f7}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden}

/* Hero */
.hero{background:linear-gradient(135deg,#1a1a2e,#16213e);border-bottom:1px solid var(--border);padding:50px 20px 40px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 0%,rgba(88,166,255,.08),transparent 60%);pointer-events:none}
.hero h1{font-size:2.4em;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;position:relative}
.hero .sub{font-size:1em;color:var(--text2);position:relative}
.hero .week-badge{display:inline-block;margin-top:12px;padding:4px 16px;background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.25);border-radius:16px;font-size:.82em;color:var(--accent);position:relative}

/* Timeline Trigger */
.tl-trigger{position:fixed;left:16px;top:50%;transform:translateY(-50%);z-index:50;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(8px)}
.tl-trigger:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);color:var(--text)}
.tl-trigger svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2}

/* Timeline Panel */
.tl-overlay{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:opacity .25s}
.tl-overlay.show{opacity:1;pointer-events:auto}
.tl-panel{position:fixed;left:0;top:0;bottom:0;z-index:90;width:280px;background:var(--bg2);border-right:1px solid var(--border);transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow-y:auto}
.tl-panel.show{transform:translateX(0)}
.tl-panel-header{padding:20px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.tl-panel-header h3{font-size:.95em;font-weight:600;color:var(--text)}
.tl-close{width:28px;height:28px;border-radius:6px;background:none;border:1px solid transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1em;transition:all .15s}
.tl-close:hover{background:rgba(255,255,255,.06);border-color:var(--border);color:var(--text)}

.tl-all-btn{display:block;width:calc(100% - 32px);margin:16px 16px 0;padding:10px 14px;background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.2);border-radius:10px;color:var(--accent);font-size:.82em;cursor:pointer;text-align:left;transition:all .15s}
.tl-all-btn:hover{background:rgba(88,166,255,.14)}
.tl-all-btn.active{background:rgba(88,166,255,.18);border-color:var(--accent);font-weight:600}

.tl-list{flex:1;padding:16px;overflow-y:auto}
.tl-node{display:flex;gap:12px;padding:12px 14px;border-radius:10px;cursor:pointer;transition:all .15s;position:relative;margin-bottom:4px}
.tl-node:hover{background:rgba(255,255,255,.04)}
.tl-node.active{background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.2)}
.tl-node .tl-dot{width:10px;height:10px;border-radius:50%;background:var(--border);margin-top:5px;flex-shrink:0;transition:all .2s}
.tl-node.active .tl-dot{background:var(--accent);box-shadow:0 0 8px rgba(88,166,255,.4)}
.tl-node .tl-info{flex:1;min-width:0}
.tl-node .tl-week{font-size:.82em;font-weight:600;color:var(--text);margin-bottom:2px}
.tl-node.active .tl-week{color:var(--accent)}
.tl-node .tl-meta{font-size:.72em;color:var(--text2);line-height:1.4}
.tl-node .tl-top{font-size:.7em;color:var(--text2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-node .tl-count{font-size:.75em;color:var(--accent);font-weight:600;flex-shrink:0;margin-top:4px}

.tl-empty{padding:24px 16px;text-align:center;color:var(--text2);font-size:.8em}

/* Container */
.container{max-width:1100px;margin:0 auto;padding:24px 20px 40px;transition:margin-left .3s cubic-bezier(.4,0,.2,1)}
body.panel-open .container{margin-left:280px}

/* Insight banner */
.insight-banner{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:32px}
.insight-banner h2{font-size:1.15em;color:var(--orange);margin-bottom:14px}
.insight-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.insight-item{background:var(--card);border-radius:8px;padding:14px;border-left:3px solid var(--accent)}
.insight-item h3{font-size:.85em;color:var(--text);margin-bottom:4px}
.insight-item p{font-size:.78em;color:var(--text2);line-height:1.5}

/* Section title */
.section-title{font-size:1.4em;font-weight:700;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid var(--border);display:flex;align-items:baseline;gap:10px}
.section-title .count{font-size:.5em;font-weight:500;color:var(--text2);padding:2px 10px;background:var(--bg2);border-radius:10px}

/* Cards */
.project-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px;transition:border-color .2s,box-shadow .2s}
.project-card:hover{border-color:var(--accent);box-shadow:0 4px 20px rgba(88,166,255,.06)}
.card-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.rank{font-size:1.3em;font-weight:800;color:var(--text2);min-width:40px;line-height:1.2}
.card-title-group{flex:1;min-width:0}
.project-name{font-size:1.05em;font-weight:600;margin-bottom:2px}
.project-name a{color:var(--accent);text-decoration:none}
.project-name a:hover{text-decoration:underline}
.lang-tag{display:inline-block;font-size:.68em;padding:2px 7px;background:rgba(88,166,255,.1);color:var(--accent);border-radius:4px;font-weight:500}
.week-chip{display:inline-block;font-size:.65em;padding:1px 8px;background:rgba(163,113,247,.1);color:var(--purple);border-radius:4px;margin-left:6px;font-weight:500;vertical-align:2px}
.project-desc{color:var(--text2);font-size:.85em;margin-bottom:14px;line-height:1.5}
.stats-row{display:flex;gap:20px;margin-bottom:16px;padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.stat{display:flex;flex-direction:column;align-items:center;min-width:80px}
.stat-value{font-size:1.15em;font-weight:700}
.stat.highlight .stat-value{color:var(--green)}
.stat-label{font-size:.65em;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

.analysis-section{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-bottom:12px}
.analysis-block{background:var(--bg2);border-radius:8px;padding:14px;border-left:3px solid var(--border)}
.analysis-block.tech{border-left-color:var(--accent)}
.analysis-block.industry{border-left-color:var(--purple)}
.analysis-block.use-cases{border-left-color:var(--green)}
.analysis-block h4{font-size:.75em;font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.analysis-block.tech h4{color:var(--accent)}
.analysis-block.industry h4{color:var(--purple)}
.analysis-block.use-cases h4{color:var(--green)}
.analysis-block p{font-size:.78em;color:var(--text2);line-height:1.6}

.tags-row{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:.68em;padding:2px 9px;background:rgba(163,113,247,.1);color:var(--purple);border-radius:10px;font-weight:500}

/* States */
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-state .icon{font-size:2.5em;margin-bottom:12px;opacity:.4}
.loading{text-align:center;padding:60px 20px;color:var(--text2);font-size:.9em}

/* Footer */
.footer{text-align:center;padding:32px 20px;color:var(--text2);font-size:.8em;border-top:1px solid var(--border);margin-top:32px}
.footer a{color:var(--accent);text-decoration:none}

/* Download corner */
.dl-corner{position:fixed;bottom:20px;right:20px;z-index:60}
.dl-corner-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--text2);font-size:.9em;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;font-family:inherit}
.dl-corner-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:var(--text)}
.dl-corner-menu{display:none;position:absolute;bottom:44px;right:0;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;min-width:130px}
.dl-corner-menu.show{display:block}
.dl-corner-menu a{display:block;padding:9px 16px;color:var(--text2);text-decoration:none;font-size:.78em;transition:background .15s}
.dl-corner-menu a:hover{background:rgba(88,166,255,.08);color:var(--text)}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

@media(max-width:768px){
  .hero h1{font-size:1.6em}
  .tl-panel{width:260px}
  body.panel-open .container{margin-left:0}
  .analysis-section{grid-template-columns:1fr}
  .stats-row{gap:10px}.stat{min-width:55px}.stat-value{font-size:1em}
}
</style>
</head>
<body>

<!-- Timeline Trigger -->
<button class="tl-trigger" id="tlTrigger" title="时间轴">
  <svg viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="22"/><circle cx="12" cy="4" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="20" r="2"/></svg>
</button>

<!-- Timeline Overlay -->
<div class="tl-overlay" id="tlOverlay"></div>

<!-- Timeline Panel -->
<div class="tl-panel" id="tlPanel">
  <div class="tl-panel-header">
    <h3>周刊时间轴</h3>
    <button class="tl-close" id="tlClose">&times;</button>
  </div>
  <button class="tl-all-btn" id="tlAllBtn" data-week="all">全部周期</button>
  <div class="tl-list" id="tlList"></div>
</div>

<!-- Hero -->
<div class="hero">
  <h1>GitHub Trending 周刊</h1>
  <p class="sub">AI 时代的技术脉搏，每周精选全球热门开源项目</p>
  <span class="week-badge" id="weekBadge">加载中…</span>
</div>

<!-- Content -->
<div class="container" id="mainContainer">
  <div id="insightSection"></div>
  <div id="projectsSection"></div>
  <div class="footer">
    <p>数据来源：<a href="https://github.com/trending?since=weekly" target="_blank">GitHub Trending</a> | Generated by Marvis AI Assistant</p>
  </div>
</div>

<!-- Download -->
<div class="dl-corner">
  <button class="dl-corner-btn" id="dlBtn" title="下载数据">⬇</button>
  <div class="dl-corner-menu" id="dlMenu">
    <a href="trending-tracker/trending_data.json" download>JSON 数据</a>
    <a href="trending-tracker/trending_data.csv" download>CSV 表格</a>
    <a href="trending-tracker/trending_data.md" download>Markdown</a>
  </div>
</div>

<script>
(function(){
  var allData=[],weeks=[];
  var currentWeek='latest'; // 'latest' | 'all' | '2026-W25'

  // DOM
  var $tlTrigger=document.getElementById('tlTrigger');
  var $tlOverlay=document.getElementById('tlOverlay');
  var $tlPanel=document.getElementById('tlPanel');
  var $tlClose=document.getElementById('tlClose');
  var $tlAllBtn=document.getElementById('tlAllBtn');
  var $tlList=document.getElementById('tlList');
  var $weekBadge=document.getElementById('weekBadge');
  var $insight=document.getElementById('insightSection');
  var $projects=document.getElementById('projectsSection');
  var $main=document.getElementById('mainContainer');
  var $body=document.body;

  // Download
  var $dlBtn=document.getElementById('dlBtn');
  var $dlMenu=document.getElementById('dlMenu');
  $dlBtn.addEventListener('click',function(e){e.stopPropagation();$dlMenu.classList.toggle('show')});
  document.addEventListener('click',function(){$dlMenu.classList.remove('show')});

  // Panel toggle
  function openPanel(){$tlPanel.classList.add('show');$tlOverlay.classList.add('show');$body.classList.add('panel-open')}
  function closePanel(){$tlPanel.classList.remove('show');$tlOverlay.classList.remove('show');$body.classList.remove('panel-open')}
  $tlTrigger.addEventListener('click',openPanel);
  $tlClose.addEventListener('click',closePanel);
  $tlOverlay.addEventListener('click',closePanel);

  // Esc to close
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closePanel()});

  // ====== Data loading ======
  fetch('./trending-tracker/trending_data.json')
    .then(function(r){return r.json()})
    .then(function(data){
      allData=data;
      weeks=extractWeeks(data);
      currentWeek=weeks.length?('W'+weeks[weeks.length-1].replace(/^.*W(\d+)$/,'$1')):'latest';
      if(weeks.length)currentWeek=weeks[weeks.length-1];
      renderTimeline();
      applyFilter(currentWeek);
    })
    .catch(function(err){
      console.error(err);
      $projects.innerHTML='<div class="empty-state"><div class="icon">&#9888;</div><p>数据加载失败</p><p style="font-size:.78em;margin-top:8px">请确认 trending-tracker/trending_data.json 存在</p></div>';
      $weekBadge.textContent='数据加载失败';
    });

  function extractWeeks(data){
    var seen={},w=[];
    data.forEach(function(d){
      if(d.week&&!seen[d.week]){seen[d.week]=true;w.push(d.week)}
    });
    w.sort();
    return w;
  }

  // ====== Timeline ======
  function renderTimeline(){
    if(!weeks.length){$tlList.innerHTML='<div class="tl-empty">暂无历史数据</div>';return}
    var html='';
    weeks.forEach(function(w){
      var items=allData.filter(function(d){return d.week===w});
      var topItem=items[0]||{};
      var topName=topItem.full_name||'—';
      html+='<div class="tl-node" data-week="'+w+'">'
        +'<div class="tl-dot"></div>'
        +'<div class="tl-info">'
        +'<div class="tl-week">'+formatWeek(w)+'</div>'
        +'<div class="tl-meta">'+items.length+' 个项目</div>'
        +'<div class="tl-top">榜首：'+topName+'</div>'
        +'</div>'
        +'<div class="tl-count">'+items.length+'</div>'
        +'</div>';
    });
    $tlList.innerHTML=html;

    // Click handlers
    var nodes=$tlList.querySelectorAll('.tl-node');
    nodes.forEach(function(n){
      n.addEventListener('click',function(){
        var wk=n.dataset.week;
        applyFilter(wk);
        setActive(wk);
        closePanel();
      });
    });

    $tlAllBtn.addEventListener('click',function(){
      applyFilter('all');
      setActive('all');
      closePanel();
    });
  }

  function setActive(week){
    $tlAllBtn.classList.toggle('active',week==='all');
    var nodes=$tlList.querySelectorAll('.tl-node');
    nodes.forEach(function(n){n.classList.toggle('active',n.dataset.week===week)});
  }

  function formatWeek(w){
    var m=w.match(/^(\d{4})-W(\d+)$/);
    if(!m)return w;
    return m[1]+'年 第'+parseInt(m[2])+'周';
  }

  // ====== Filter & Render ======
  function applyFilter(week){
    currentWeek=week;
    var filtered=(week==='all')?allData:allData.filter(function(d){return d.week===week});
    setActive(week);

    // Badge
    if(week==='all'){$weekBadge.textContent='全部周期 · '+weeks.length+' 期 · '+filtered.length+' 个项目'}
    else{$weekBadge.textContent=formatWeek(week)+' · '+filtered.length+' 个项目'}

    // Insight
    renderInsight(filtered);

    // Projects
    renderProjects(filtered);
  }

  function renderInsight(data){
    if(!data.length){$insight.innerHTML='';return}

    var languages={};
    var agentCount=0;
    var maxWeekly=0;
    var topLang='',topLangCount=0;
    data.forEach(function(d){
      if(d.language){
        languages[d.language]=languages[d.language]||0;
        languages[d.language]++;
      }
      if(d.weekly_stars>maxWeekly)maxWeekly=d.weekly_stars;
    });
    for(var l in languages){if(languages[l]>topLangCount){topLang=l;topLangCount=languages[l]}}

    // Count AI/Agent related
    data.forEach(function(d){
      var desc=(d.description||'')+(d.tags||'');
      if(/AI|Agent|LLM|机器人|智能|GPT/i.test(desc))agentCount++;
    });

    var insights=[
      {title:'收录项目',text:data.length+' 个项目'},
      {title:'主流语言',text:Object.keys(languages).length+' 种编程语言，以 '+topLang+' 为主'},
      {title:'AI/Agent 相关',text:agentCount+' 个项目（'+Math.round(agentCount/data.length*100)+'%）'},
      {title:'最高周增长',text:'+'+maxWeekly.toLocaleString()+' Stars'}
    ];

    var html='<div class="insight-banner"><h2>数据概览</h2><div class="insight-grid">';
    insights.forEach(function(i){
      html+='<div class="insight-item"><h3>'+i.title+'</h3><p>'+i.text+'</p></div>';
    });
    html+='</div></div>';
    $insight.innerHTML=html;
  }

  function renderProjects(data){
    if(!data.length){$projects.innerHTML='<div class="empty-state"><div class="icon">&#128218;</div><p>该周期暂无项目数据</p></div>';return}

    var html='<div class="section-title"><span>项目排行</span><span class="count">TOP '+data.length+'</span></div>';

    // Sort by weekly_stars desc
    var sorted=data.slice().sort(function(a,b){return(b.weekly_stars||0)-(a.weekly_stars||0)});

    sorted.forEach(function(d,i){
      var rank=i+1;
      var rankClass='';
      if(rank===1)rankClass=' style="color:var(--orange)"';
      else if(rank===2)rankClass=' style="color:#b0b8c4"';
      else if(rank===3)rankClass=' style="color:#c49a6c"';

      html+='<div class="project-card">'
        +'<div class="card-header">'
        +'<span class="rank"'+rankClass+'>#'+rank+'</span>'
        +'<div class="card-title-group">'
        +'<h3 class="project-name"><a href="'+esc(d.url)+'" target="_blank">'+esc(d.full_name)+'</a>'
        +'<span class="week-chip">'+formatWeek(d.week)+'</span></h3>'
        +(d.language?'<span class="lang-tag">'+esc(d.language)+'</span>':'')
        +'</div></div>'
        +'<p class="project-desc">'+esc(d.description)+'</p>'
        +'<div class="stats-row">'
        +'<div class="stat"><span class="stat-value">'+(d.total_stars||0).toLocaleString()+'</span><span class="stat-label">Total Stars</span></div>'
        +'<div class="stat highlight"><span class="stat-value">+'+(d.weekly_stars||0).toLocaleString()+'</span><span class="stat-label">This Week</span></div>'
        +'<div class="stat"><span class="stat-value">'+(d.forks||0).toLocaleString()+'</span><span class="stat-label">Forks</span></div>'
        +'</div>';

      // Analysis
      if(d.tech_highlights||d.industry_significance||d.use_cases){
        html+='<div class="analysis-section">';
        if(d.tech_highlights)html+='<div class="analysis-block tech"><h4>技术亮点</h4><p>'+esc(d.tech_highlights)+'</p></div>';
        if(d.industry_significance)html+='<div class="analysis-block industry"><h4>行业意义</h4><p>'+esc(d.industry_significance)+'</p></div>';
        if(d.use_cases)html+='<div class="analysis-block use-cases"><h4>适用场景</h4><p>'+esc(d.use_cases)+'</p></div>';
        html+='</div>';
      }

      if(d.tags){
        html+='<div class="tags-row">';
        d.tags.split(',').forEach(function(t){t=t.trim();if(t)html+='<span class="tag">'+esc(t)+'</span>'});
        html+='</div>';
      }

      html+='</div>';
    });

    $projects.innerHTML=html;
  }

  function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

})();
</script>
</body>
</html>
